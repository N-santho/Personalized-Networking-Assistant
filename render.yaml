services:
  # FastAPI Backend Service
  - type: web
    name: skillwallet-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: INFO
      - key: DATABASE_URL
        value: sqlite:///./networking.db
      - key: FORCE_FALLBACK
        value: "True"

  # Streamlit Frontend Dashboard Service
  - type: web
    name: skillwallet-frontend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run frontend/streamlit_app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: BACKEND_URL
        fromService:
          type: web
          name: skillwallet-backend
          property: hostport
